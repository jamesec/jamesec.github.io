### EFT 督导师的八项核心技能：计分表（第 2 版）
by [Robert Elliott, Ph.D.](https://iseft.org/boardmembers) 译者：陈艺文、田婴 2025 年 7 月 16 日
  
<table>
  <tr>
    <th style="width: 35%;">督导师技能</th>
    <th style="width: 65%;">笔记</th>
  </tr>
  <tr>
    <td><strong>希望被督导的问题：</strong></td>
    <td></td>
  </tr>
  <tr>
    <td>1. <strong>肯定与合作：</strong> 督导师以真诚的、肯定的态度，共情着被督导者，一直在场。</td>
    <td></td>
  </tr>
  <tr>
    <td>2. <strong>说出你看到了什么过程：</strong> （通常是督导师与被督导者一起看治疗过程录像的时候，）以 EFT 的用词说出正在发生着什么（这是最基本的技能；以 EFT 的用词来形成过程概念化）</td>
    <td></td>
  </tr>
  <tr>
    <td>3. <strong>一起看接下来，来访者的过程走向。</strong> 引导被督导者关注：来访者对于治疗师回应她/他之后，所做的即时回应，以及来访者的过程如何进一步发展（即：「走向何处」）。</td>
    <td></td>
  </tr>
  <tr>
    <td>4. <strong>即时地与来访者过程同调并说出来：</strong> 督导师示范——与来访者的过程如何深度同调。</td>
    <td></td>
  </tr>
  <tr>
    <td>5. <strong>促进 EFT 个案概念化。</strong> 帮助被督导者理解来访者的过程，形成一种可能的个案概念化，理解其叙事，从而创建出一条「轴线」，可以用它来帮助指引如何「一同前行」。</td>
    <td></td>
  </tr>
  <tr>
    <td>6. <strong>同调并进入被督导者的体验：</strong>  探索被督导者的参考框架 / 个案概念化 / 具身体验 / 内在阻滞。</td>
    <td></td>
  </tr>
  <tr>
    <td>7. <strong>Say what you would do:</strong> Including what could be done/how it could be done more productively; suggestions for therapy activities.</td>
    <td></td>
  </tr>
  <tr>
    <td>8. <strong>Tell how it works:</strong> Explaining/experiential teaching for supervisees.</td>
    <td></td>
  </tr>
